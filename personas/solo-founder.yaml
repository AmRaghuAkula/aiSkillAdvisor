---
# Solo Founder persona — single founder building a SaaS product.
# Archetype: HireAstra-style. Time-poor, polymath-curious, ships daily,
# treats onboarding as friction. High stakes on billing + security because
# real money flows through their hands; no co-founder to catch mistakes.

persona:
  id: solo-founder
  name: Solo Founder
  description: |
    A single non-technical or semi-technical founder building a SaaS product
    end-to-end. They wear every hat: product, design, engineering, security,
    billing, support. They ship most days, prefer momentum over polish,
    and trust their gut on UX but worry constantly about silent failures
    in payments, auth, and data integrity.

    They are polymath-curious — they will adopt skills from any ecosystem if
    the value is obvious in under 60 seconds. They hate onboarding flows
    that feel like setup tax. They want skills to surface JUST IN TIME, not
    front-load a configuration interview.

  primary_intent: >
    Ship a working SaaS feature safely without burning a week on plumbing
    or a weekend on a security incident.

  job_to_be_done: >
    "Help me get from idea to merged-PR-in-production without missing a
    skill that would have saved me from a bug, a leak, or a regression."

  time_budget_per_session: 45
  risk_tolerance: low            # for billing/auth/data — paranoid
  technical_depth: medium-low    # can read code, can't write Postgres RLS unaided

  primary_work_types:
    - data-financials
    - security-auth
    - ai-llm-scoring
    - infra-migration
    - perf-debug
    - visual-brand          # secondary; they care but rarely have time

  skill_weightings:
    # Safety + revenue first — heavily boosted
    cso: 2.0                          # security review before every billing/auth merge
    careful: 1.8                      # destructive command guardrails
    freeze: 1.6                       # session-scoped edit fences
    verification-before-completion: 1.8  # founders over-claim "done"; this catches it

    # Shipping discipline — boosted
    ship: 1.7                         # end-to-end merge + deploy mechanization
    autoplan: 1.5                     # pre-merge sweep (CEO/eng/design/DX)
    code-review: 1.4
    review: 1.4
    health: 1.3                       # phase-entry quality dashboard

    # Planning before code — boosted (founders skip planning constantly)
    writing-plans: 1.5
    brainstorming: 1.3                # only for genuinely ambiguous-scope work
    investigate: 1.4                  # systematic debugging > tail -f log loops

    # Deploy + env — moderately boosted
    vercel:deploy: 1.4
    vercel:env-vars: 1.4
    vercel:nextjs: 1.2

    # Verification + dogfooding — moderately boosted
    browse: 1.3
    run-hireastra: 1.3
    qa: 1.2

    # Design — present but not boosted (founder cares but defers under pressure)
    design-review: 1.0
    design-html: 0.9
    design-consultation: 0.8

    # Things they don't need
    design-shotgun: 0.6               # one founder, one direction — no variant rounds
    frontend-design: 0.7              # over-creative for product surfaces
    dispatching-parallel-agents: 0.5  # single operator; rarely needs parallel
    benchmark: 0.9                    # only on perf-sensitive surfaces
    retro: 0.7                        # weekly cadence; nice-to-have not must-have

    # Docs hygiene — useful but not core
    claude-md-improver: 1.1
    context-save: 1.2                 # founders hit context limits often

  quality_judgment_phrases:
    # Phrases this founder uses that should trigger design/quality skills
    # even when the change looks trivial in LOC
    - "premium"
    - "feels like a $X/mo product"
    - "polish"
    - "elevated"
    - "production-ready"
    - "looks AI-generated"
    - "feels cheap"
    - "trustworthy"

  starter_workflow:
    # First 3-5 things this persona does in a new project
    - Run /health to see current code-quality state
    - Declare ONE goal for the session (L1 anchor)
    - Use /writing-plans before any non-trivial chunk
    - Use /cso before merging anything touching billing, auth, or RLS
    - Use /ship to merge + deploy as a single mechanized flow

  anti_recommendations:
    - skill: ios-design-review
      reason: Solo founder is on web/SaaS — iOS skills are noise.
    - skill: design-shotgun
      reason: One operator with locked design direction — variant exploration burns time without ROI.
    - skill: ios-fix
      reason: Wrong platform.
    - skill: ios-qa
      reason: Wrong platform.
    - skill: huggingface-llm-trainer
      reason: Solo founders consume LLM APIs; they don't train models.
    - skill: huggingface-vision-trainer
      reason: Out of scope for a SaaS founder.
    - skill: dispatching-parallel-agents
      reason: Single-operator workflow rarely benefits from parallel agents; adds coordination overhead.

  onboarding_questions_to_skip:
    - team_size                   # always 1
    - code_review_culture         # no team to review
    - design_system_maturity      # they're building it themselves
    - sprint_cadence              # ship-when-ready not sprint-based
    - jira_workflow               # founders use GitHub Issues or a notes app
